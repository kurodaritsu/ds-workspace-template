# Ds Workspace Template Workflow Deprecate And Absorb Skills Into Rules

## Action

Follow the deprecate-and-absorb-skills-into-rules workflow:
1. Expand rule files in .claude/rules/ to absorb content from .claude/skills/ (e.g., commands, examples, references).
2. Delete the now-redundant skill files from .claude/skills/.
3. Update any project documentation (e.g., CLAUDE.md) to reflect the new structure.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .claude/rules/lint-and-format.md, .claude/rules/type-checking.md, .claude/skills/ruff-lint/SKILL.md

